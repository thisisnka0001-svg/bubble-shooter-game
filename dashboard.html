<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Bubble Rewards</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

.container{
padding:40px;
}

.card{
background:#111827;
max-width:500px;
margin:auto;
padding:30px;
border-radius:12px;
}

h1{
margin-bottom:20px;
}

.info{
font-size:22px;
margin:20px 0;
}

.btn{
display:block;
margin:15px auto;
padding:15px;
width:220px;
background:#22c55e;
color:white;
text-decoration:none;
border-radius:8px;
font-size:18px;
}

button{
padding:15px;
width:220px;
background:#ef4444;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1 id="welcome">Welcome</h1>

<div class="info">
🪙 Points: <span id="points">0</span>
</div>

<div class="info">
💰 Wallet: ₹<span id="wallet">0</span>
</div>

<a class="btn" href="play.html">🎮 Play Game</a>

<button id="logoutBtn">Logout</button>

</div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
