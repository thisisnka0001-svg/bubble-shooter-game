<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Bubble Rewards</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#111827;
padding:40px;
border-radius:12px;
width:350px;
color:white;
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#22c55e;
color:white;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.back{
display:block;
text-align:center;
margin-top:20px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Login</h1>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="loginBtn">Login</button>

<a class="back" href="index.html">⬅ Back to Home</a>

</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
